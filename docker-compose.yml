name: inventory-source-to-clickhouse-demo

services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka_broker
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_broker:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka_broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - data_network

  kafka-init:
    image: apache/kafka:4.1.1
    container_name: kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic inventory_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic po_lines_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic sales_lines_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic snapshot_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic stock_counts_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic dim_skus_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic dim_warehouses_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic dim_suppliers_topic --partitions 1 --replication-factor 1 && \
         /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka_broker:9092 --create --if-not-exists --topic dim_customers_topic --partitions 1 --replication-factor 1 && \
         echo 'Kafka topics ready'"
    restart: "no"
    networks:
      - data_network

  clickhouse:
    image: clickhouse/clickhouse-server:25.8.15.35
    container_name: clickhouse_db
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: inventory_db
      CLICKHOUSE_USER: password
      CLICKHOUSE_PASSWORD: admin
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_init:/docker-entrypoint-initdb.d
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user password --password admin --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - data_network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: Local-KRaft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_broker:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - data_network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_source
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -No -Q \"SELECT 1\" > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - data_network

  sqlserver-init:
    build:
      context: .
      dockerfile: docker/sqlserver-init/Dockerfile
    container_name: sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_PORT: 1433
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-inventory_demo}
      SEED_ROWS: ${SEED_ROWS:-180000}
      SEED_DAYS_BACK: ${SEED_DAYS_BACK:-45}
    restart: "no"
    networks:
      - data_network

  sqlserver-live-generator:
    profiles: ["live-gen"]
    build:
      context: .
      dockerfile: docker/sqlserver-generator/Dockerfile
    container_name: sqlserver_live_generator
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_PORT: 1433
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-inventory_demo}
      LIVE_BATCH_ROWS: ${LIVE_BATCH_ROWS:-250}
      LIVE_BATCH_INTERVAL_SECONDS: ${LIVE_BATCH_INTERVAL_SECONDS:-15}
    restart: unless-stopped
    networks:
      - data_network

  logstash:
    build:
      context: .
      dockerfile: docker/logstash/Dockerfile
      args:
        LOGSTASH_VERSION: ${LOGSTASH_VERSION:-8.19.12}
        MSSQL_JDBC_VERSION: ${MSSQL_JDBC_VERSION:-13.2.1.jre11}
    container_name: logstash_member2
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_PORT: 1433
      MSSQL_DATABASE: ${MSSQL_DATABASE:-inventory_demo}
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_PASSWORD: ${MSSQL_SA_PASSWORD}
      LOGSTASH_POLL_INTERVAL: ${LOGSTASH_POLL_INTERVAL:-10s}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka_broker:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-inventory_topic}
    ports:
      - "9600:9600"
    volumes:
      - logstash_state:/usr/share/logstash/data
    restart: unless-stopped
    networks:
      - data_network

  chatserver:
    build:
      context: ./apps/chatserver
      dockerfile: Dockerfile
    container_name: inventory_chatserver
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CHATSERVER_HOST: 0.0.0.0
      CHATSERVER_PORT: 8001
      CHATSERVER_RELOAD: "false"
      CHATSERVER_LOG_LEVEL: info
      CHATSERVER_SOCKETIO_PATH: socket.io
      CHATSERVER_PUBLIC_NAMESPACES: warehouse
      CHATSERVER_ALLOW_ORIGINS: ${CHATSERVER_ALLOW_ORIGINS:-http://localhost:3000}
      CHATSERVER_DATABASE_PATH: /data/chatserver.db
      CHATSERVER_CLICKHOUSE_HOST: clickhouse_db
      CHATSERVER_CLICKHOUSE_PORT: 8123
      CHATSERVER_CLICKHOUSE_USERNAME: password
      CHATSERVER_CLICKHOUSE_PASSWORD: admin
      CHATSERVER_CLICKHOUSE_DATABASE: inventory_mart
      CHATSERVER_CLICKHOUSE_RAW_DATABASE: inventory_raw
      CHATSERVER_CLICKHOUSE_MART_DATABASE: inventory_mart
      CHATSERVER_AZURE_OPENAI_ENDPOINT: ${CHATSERVER_AZURE_OPENAI_ENDPOINT:-}
      CHATSERVER_AZURE_OPENAI_API_KEY: ${CHATSERVER_AZURE_OPENAI_API_KEY:-}
      CHATSERVER_AZURE_OPENAI_API_VERSION: ${CHATSERVER_AZURE_OPENAI_API_VERSION:-2024-10-21}
      CHATSERVER_AZURE_OPENAI_DEPLOYMENT_NAME: ${CHATSERVER_AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-5.2}
      CHATSERVER_AZURE_OPENAI_MAX_RETRIES: ${CHATSERVER_AZURE_OPENAI_MAX_RETRIES:-2}
      CHATSERVER_OPENAI_API_KEY: ${CHATSERVER_OPENAI_API_KEY:-}
      CHATSERVER_OPENAI_BASE_URL: ${CHATSERVER_OPENAI_BASE_URL:-}
      CHATSERVER_OPENAI_MODEL: ${CHATSERVER_OPENAI_MODEL:-gpt-5.2}
      CHATSERVER_OPENAI_TIMEOUT_SECONDS: ${CHATSERVER_OPENAI_TIMEOUT_SECONDS:-60}
    ports:
      - "8001:8001"
    volumes:
      - chatserver_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_network

  chatui:
    build:
      context: ./apps/chatui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CHATSERVER_URL: ${NEXT_PUBLIC_CHATSERVER_URL:-http://localhost:8001}
        NEXT_PUBLIC_CHATSERVER_SOCKET_PATH: ${NEXT_PUBLIC_CHATSERVER_SOCKET_PATH:-/socket.io}
        NEXT_PUBLIC_CHAT_NAMESPACE: ${NEXT_PUBLIC_CHAT_NAMESPACE:-warehouse}
    container_name: inventory_chatui
    depends_on:
      chatserver:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_CHATSERVER_URL: ${NEXT_PUBLIC_CHATSERVER_URL:-http://localhost:8001}
      NEXT_PUBLIC_CHATSERVER_SOCKET_PATH: ${NEXT_PUBLIC_CHATSERVER_SOCKET_PATH:-/socket.io}
      NEXT_PUBLIC_CHAT_NAMESPACE: ${NEXT_PUBLIC_CHAT_NAMESPACE:-warehouse}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_network

volumes:
  kafka_data:
  clickhouse_data:
  sqlserver_data:
  logstash_state:
  chatserver_data:

networks:
  data_network:
    driver: bridge
