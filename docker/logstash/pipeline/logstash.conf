filter {
  mutate {
    convert => {
      "qty_change" => "integer"
      "qty_ordered" => "integer"
      "qty_received" => "integer"
      "qty" => "integer"
      "system_qty" => "integer"
      "counted_qty" => "integer"
      "variance_qty" => "integer"
      "on_hand_qty" => "integer"
      "reserved_qty" => "integer"
      "damaged_qty" => "integer"
      "in_transit_qty" => "integer"
      "available_qty" => "integer"
    }
    remove_field => ["stream_seq", "@timestamp", "@version"]
  }
}

output {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka_broker:9092}"
    topic_id => "%{[@metadata][kafka_topic]}"
    codec => json
    acks => "1"
    compression_type => "gzip"
  }
}
